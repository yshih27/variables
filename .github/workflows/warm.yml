# Scheduled data warmers — refresh the Postgres snapshots the app reads.
# The warmer scripts write straight to Supabase via the service key, so the
# Vercel app just reads. Each warmer is an INDEPENDENT step (continue-on-error)
# so one flaky source (e.g. a Helius 429) can't block the others.
#
# ONE JOB PER BATCH, each with its own timeout. Previously all three batches
# shared a single job + one timeout, so the heavy weekly CC crawl (~122K assets)
# and the slow core batch kept hitting the ceiling and getting cancelled
# mid-run, which starved the later steps. Splitting them means a slow batch
# can't cancel another, and the weekly crawl gets the headroom it needs. Only
# the triggered batch's job runs (the others are skipped), so cost is unchanged.
#
# Trigger any batch manually from the Actions tab (workflow_dispatch → batch).
name: warm

on:
  schedule:
    - cron: "0 */6 * * *" # every 6h — core market data
    - cron: "30 5 * * *" # daily 05:30 UTC — holders, beezie traits, fresh gacha
    - cron: "0 4 * * 1" # Mondays 04:00 UTC — full CC trait crawl (heavy)
  workflow_dispatch:
    inputs:
      batch:
        description: Which batch to run
        type: choice
        default: core
        options: [core, daily, cc-traits]

# One run at a time; never cancel an in-flight warm (cancelling mid-write is
# what used to lose data — keep cancel-in-progress false).
concurrency:
  group: warm
  cancel-in-progress: false

# Shared by every job — the warmers all write to the same Supabase project.
env:
  DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
  HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
  RARIBLE_API_KEY: ${{ secrets.RARIBLE_API_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  # ── Core market data — every 6h (~40–44m of independent steps) ──
  core:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 */6 * * *')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.batch == 'core')
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Listings
        continue-on-error: true
        run: npx tsx scripts/warm-listings.ts
      - name: Market cap # reads the listings snapshot written above
        continue-on-error: true
        run: npx tsx scripts/warm-marketcap.ts
      - name: Core volume (cached Dune + Rarible)
        continue-on-error: true
        run: npx tsx scripts/warm-core-dune.ts --cached
      - name: Courtyard primary
        continue-on-error: true
        run: npx tsx scripts/warm-courtyard-primary.ts
      - name: Primary revenue
        continue-on-error: true
        run: npx tsx scripts/warm-primary-revenue.ts
      - name: Backfill history
        continue-on-error: true
        run: npx tsx scripts/backfill-history.ts
      - name: Gacha (cached)
        continue-on-error: true
        run: npx tsx scripts/warm-gacha-dune.ts --cached
      - name: Phygitals gacha (CLAW feed)
        # Frequent runs accumulate the feed's shallow recent window into the
        # gacha_pulls spine; odds/EV are computed over the 7d accumulation.
        continue-on-error: true
        run: npx tsx scripts/warm-phygitals-gacha.ts
      - name: CC gacha (native winners feed + machine catalog)
        # Per-pack stated odds/EV/buyback + realized pulls from
        # gacha.collectorcrypt.com; also feeds the gacha_pulls spine.
        continue-on-error: true
        run: npx tsx scripts/warm-cc-gacha.ts
      - name: Gacha pack catalog (Beezie /claw + Phygitals /vm/chase + CC native + realized)
        # Must run AFTER phygitals-gacha and cc-gacha (reads what they write).
        continue-on-error: true
        run: npx tsx scripts/warm-gacha-packs.ts

  # ── Daily — holders, beezie traits, fresh gacha + time-series spine ──
  daily:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '30 5 * * *')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.batch == 'daily')
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Holders
        continue-on-error: true
        run: npx tsx scripts/warm-holders.ts
      - name: Beezie traits
        continue-on-error: true
        run: npx tsx scripts/warm-traits.ts
      - name: Gacha (fresh)
        continue-on-error: true
        run: npx tsx scripts/warm-gacha-dune.ts
      - name: Phygitals marketplace
        continue-on-error: true
        run: npx tsx scripts/warm-phygitals.ts
      - name: Core volume (fresh Dune execution)
        continue-on-error: true
        run: npx tsx scripts/warm-core-dune.ts
      # Time-series spine — runs LAST: it reads the fresh core-volume (Dune),
      # marketcap, and holders output the steps above wrote.
      - name: Metric snapshots (time-series spine)
        continue-on-error: true
        run: npx tsx scripts/warm-metric-snapshots.ts

  # ── Weekly — full CC collection trait crawl (~122K assets, slow) ──
  # Its own job + a generous timeout: this crawl is what kept blowing the old
  # shared 45m ceiling and getting cancelled (so cc-traits never recorded).
  cc-traits:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.batch == 'cc-traits')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: CC trait crawl
        continue-on-error: true
        run: npx tsx scripts/warm-cc-traits.ts
