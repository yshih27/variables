# Scheduled data warmers — refresh the Postgres snapshots the app reads.
# The warmer scripts write straight to Supabase via the service key, so the
# Vercel app just reads. Each warmer is an INDEPENDENT step (continue-on-error)
# so one flaky source (e.g. a Helius 429) can't block the others.
#
# ONE JOB PER BATCH, each with its own timeout. Previously all three batches
# shared a single job + one timeout, so the heavy weekly CC crawl (~122K assets)
# and the slow core batch kept hitting the ceiling and getting cancelled
# mid-run, which starved the later steps. Splitting them means a slow batch
# can't cancel another, and the weekly crawl gets the headroom it needs. Only
# the triggered batch's job runs (the others are skipped), so cost is unchanged.
#
# Trigger any batch manually from the Actions tab (workflow_dispatch → batch).
name: warm

on:
  schedule:
    - cron: "0 */6 * * *" # every 6h — core market data
    - cron: "30 5 * * *" # daily 05:30 UTC — holders, beezie traits, fresh gacha
    - cron: "0 6 * * *" # daily 06:00 UTC — indices (benchmarks + sale-panel), after the daily batch
    - cron: "0 4 * * 1" # Mondays 04:00 UTC — full CC trait crawl (heavy)
    - cron: "0 8 * * 1" # Mondays 08:00 UTC — weekly report (after cc-traits/daily/indices are done)
  workflow_dispatch:
    inputs:
      batch:
        description: Which batch to run
        type: choice
        default: core
        options: [core, daily, indices, cc-traits, weekly-report]

# One run at a time; never cancel an in-flight warm (cancelling mid-write is
# what used to lose data — keep cancel-in-progress false).
concurrency:
  group: warm
  cancel-in-progress: false

# Shared by every job — the warmers all write to the same Supabase project.
env:
  DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
  HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
  RARIBLE_API_KEY: ${{ secrets.RARIBLE_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  # ── Core market data — every 6h (~40–44m of independent steps) ──
  core:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 */6 * * *')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.batch == 'core')
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Listings
        continue-on-error: true
        run: npx tsx scripts/warm-listings.ts
      - name: Market cap # reads the listings snapshot written above
        continue-on-error: true
        run: npx tsx scripts/warm-marketcap.ts
      - name: Core volume (cached Dune + Rarible)
        continue-on-error: true
        run: npx tsx scripts/warm-core-dune.ts --cached
      - name: Courtyard primary
        continue-on-error: true
        run: npx tsx scripts/warm-courtyard-primary.ts
      - name: Backfill history
        continue-on-error: true
        run: npx tsx scripts/backfill-history.ts
      - name: Gacha (cached)
        continue-on-error: true
        run: npx tsx scripts/warm-gacha-dune.ts --cached
      - name: Phygitals gacha (CLAW feed)
        # Frequent runs accumulate the feed's shallow recent window into the
        # gacha_pulls spine; odds/EV are computed over the 7d accumulation.
        continue-on-error: true
        run: npx tsx scripts/warm-phygitals-gacha.ts
      - name: CC gacha (native winners feed + machine catalog)
        # Per-pack stated odds/EV/buyback + realized pulls from
        # gacha.collectorcrypt.com; also feeds the gacha_pulls spine.
        continue-on-error: true
        run: npx tsx scripts/warm-cc-gacha.ts
      - name: Gacha pack catalog (Beezie /claw + Phygitals /vm/chase + CC native + realized)
        # Must run AFTER phygitals-gacha and cc-gacha (reads what they write).
        continue-on-error: true
        run: npx tsx scripts/warm-gacha-packs.ts
      - name: Homepage payload precompute
        # Pure derivation of the one-row blob fetchHomepage serves (B9-1). Runs
        # LAST — it reads what every step above wrote.
        continue-on-error: true
        run: npx tsx scripts/warm-homepage.ts
      # Health gate — the steps above are continue-on-error (one flaky source can't
      # block the rest), which also hid dead warmers behind a green run. This final
      # step (NOT continue-on-error) fails the job if any of this batch's warmers
      # errored, so the Actions run goes RED → built-in failure notification.
      - name: Health gate
        run: npx tsx scripts/check-freshness.ts --require=listings,marketcap,core-volume,courtyard-primary,history,gacha-dune,phygitals-gacha,cc-gacha,gacha-packs,homepage

  # ── Daily — holders, beezie traits, fresh gacha + time-series spine ──
  daily:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '30 5 * * *')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.batch == 'daily')
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Holders
        continue-on-error: true
        run: npx tsx scripts/warm-holders.ts
      - name: Beezie traits
        continue-on-error: true
        run: npx tsx scripts/warm-traits.ts
      - name: Secondary sales feed (Beezie ≥30d → trending 7d + momentum)
        continue-on-error: true
        run: npx tsx scripts/warm-secondary-sales.ts
      - name: Gacha (fresh)
        continue-on-error: true
        run: npx tsx scripts/warm-gacha-dune.ts
      - name: Phygitals marketplace
        continue-on-error: true
        run: npx tsx scripts/warm-phygitals.ts
      - name: Primary revenue # moved off the 6h batch — its Helius enhanced-tx crawl is a heavy credit-burner (see script header)
        continue-on-error: true
        run: npx tsx scripts/warm-primary-revenue.ts
      - name: Core volume (fresh Dune execution)
        continue-on-error: true
        run: npx tsx scripts/warm-core-dune.ts
      # Time-series spine — runs LAST: it reads the fresh core-volume (Dune),
      # marketcap, and holders output the steps above wrote.
      - name: Metric snapshots (time-series spine)
        continue-on-error: true
        run: npx tsx scripts/warm-metric-snapshots.ts
      - name: Homepage payload precompute # re-derive off the fresh daily data (B9-1)
        continue-on-error: true
        run: npx tsx scripts/warm-homepage.ts
      - name: Freshness gate # fails the job (→ Actions notifies) if any warmer errored
        run: npx tsx scripts/check-freshness.ts --require=holders,beezie-traits,secondary-sales,gacha-dune,phygitals,primary-revenue,core-volume,metric-snapshots,homepage
      # Data-integrity gate (D10-4) — everything above is fresh now. A HARD invariant
      # violation (fan-out dupes, holders union>sum, hero≠Σrows, avgTrade≠vol/trades,
      # cards>0 while vol=0) fails the run red; SOFT heuristics only warn.
      - name: Invariants gate
        run: npx tsx scripts/check-invariants.ts

  # ── Indices — benchmarks + price-index sale panel. Own job + tight timeout so a
  #    slow panel build can't starve the daily batch; runs at 06:00, after daily. ──
  indices:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.batch == 'indices')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Benchmarks (CoinGecko BTC/ETH + FRED SP500/NASDAQ)
        continue-on-error: true
        run: npx tsx scripts/warm-benchmarks.ts
      - name: Price index (sale panel → stratified-median indices)
        continue-on-error: true
        run: npx tsx scripts/warm-sale-panel.ts
      # M1 — rebuild the report whenever the index REVISES. The stratified median
      # recomputes here as late sales land, so a report frozen at Monday drifts from
      # the live homepage for the same week ("+1.3% WoW" vs "+18.5%"). Recomposing
      # right after the index keeps them on one set of numbers; the week it covers is
      # derived from the clock, so this refreshes figures, it doesn't move the window.
      - name: Weekly report (recompose against the revised index)
        continue-on-error: true
        run: npx tsx scripts/warm-weekly-report.ts
      - name: Health gate # fails the job (→ Actions notifies) if any warmer errored
        run: npx tsx scripts/check-freshness.ts --require=benchmarks,price-index,weekly-report
      # Data-integrity gate — the price index was just rewritten above. INV-7 (HARD)
      # fails the run if any index series published a FUTURE-dated point or the
      # IN-PROGRESS week (the post-#44 completeness regression), so a thin partial-week
      # spike can never silently reach the chart again.
      - name: Invariants gate (index completeness + no future points)
        run: npx tsx scripts/check-invariants.ts

  # ── Weekly report — movers ranker + composer → `weekly-report` snapshot (B9-2).
  #    Mondays 08:00, covering the just-completed Mon→Mon UTC week. Pure derivation
  #    over the spine + cached feeds; scheduled after cc-traits (04:00) / daily
  #    (05:30) / indices (06:00) so it reads a fully-refreshed week. ──
  weekly-report:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.batch == 'weekly-report')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Weekly report (movers + composer)
        continue-on-error: true
        run: npx tsx scripts/warm-weekly-report.ts
      - name: Health gate # fails the job (→ Actions notifies) if the composer errored
        run: npx tsx scripts/check-freshness.ts --require=weekly-report

  # ── Weekly — full CC collection trait crawl (~122K assets, slow) ──
  # Its own job + a generous timeout: this crawl is what kept blowing the old
  # shared 45m ceiling and getting cancelled (so cc-traits never recorded).
  cc-traits:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.batch == 'cc-traits')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: CC trait crawl
        continue-on-error: true
        run: npx tsx scripts/warm-cc-traits.ts
      - name: Health gate # fails the job (→ Actions notifies) if the crawl errored
        run: npx tsx scripts/check-freshness.ts --require=cc-traits
