# Scheduled data warmers — refresh the Postgres snapshots the app reads.
# The warmer scripts write straight to Supabase via the service key, so the
# Vercel app just reads. Each warmer is an INDEPENDENT step (continue-on-error)
# so one flaky source (e.g. a Helius 429) can't block the others. Trigger any
# batch manually from the Actions tab (workflow_dispatch).
name: warm

on:
  schedule:
    - cron: "0 */6 * * *" # every 6h — core market data
    - cron: "30 5 * * *" # daily 05:30 UTC — holders, beezie traits, fresh gacha
    - cron: "0 4 * * 1" # Mondays 04:00 UTC — full CC trait crawl (heavy)
  workflow_dispatch:
    inputs:
      batch:
        description: Which batch to run
        type: choice
        default: core
        options: [core, daily, cc-traits]

concurrency:
  group: warm
  cancel-in-progress: false

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
      HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
      RARIBLE_API_KEY: ${{ secrets.RARIBLE_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - id: which
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "batch=${{ github.event.inputs.batch }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 5 * * *" ]; then
            echo "batch=daily" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 4 * * 1" ]; then
            echo "batch=cc-traits" >> "$GITHUB_OUTPUT"
          else
            echo "batch=core" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # ── Core market data — every 6h (each step independent) ──
      - name: Listings
        if: steps.which.outputs.batch == 'core'
        continue-on-error: true
        run: npx tsx scripts/warm-listings.ts
      - name: Market cap
        if: steps.which.outputs.batch == 'core'
        continue-on-error: true
        run: npx tsx scripts/warm-marketcap.ts
      - name: Core volume (cached Dune + Rarible)
        if: steps.which.outputs.batch == 'core'
        continue-on-error: true
        run: npx tsx scripts/warm-core-dune.ts --cached
      - name: Courtyard primary
        if: steps.which.outputs.batch == 'core'
        continue-on-error: true
        run: npx tsx scripts/warm-courtyard-primary.ts
      - name: Primary revenue
        if: steps.which.outputs.batch == 'core'
        continue-on-error: true
        run: npx tsx scripts/warm-primary-revenue.ts
      - name: Backfill history
        if: steps.which.outputs.batch == 'core'
        continue-on-error: true
        run: npx tsx scripts/backfill-history.ts
      - name: Gacha (cached)
        if: steps.which.outputs.batch == 'core'
        continue-on-error: true
        run: npx tsx scripts/warm-gacha-dune.ts --cached
      - name: Phygitals gacha (CLAW feed)
        # Frequent runs accumulate the feed's shallow recent window into the
        # gacha_pulls spine; odds/EV are computed over the 7d accumulation.
        if: steps.which.outputs.batch == 'core'
        continue-on-error: true
        run: npx tsx scripts/warm-phygitals-gacha.ts
      - name: CC gacha (native winners feed + machine catalog)
        # Per-pack stated odds/EV/buyback + realized pulls from
        # gacha.collectorcrypt.com; also feeds the gacha_pulls spine.
        if: steps.which.outputs.batch == 'core'
        continue-on-error: true
        run: npx tsx scripts/warm-cc-gacha.ts
      - name: Gacha pack catalog (Beezie /claw + Phygitals /vm/chase + CC native + realized)
        # Must run AFTER phygitals-gacha and cc-gacha (reads what they write).
        if: steps.which.outputs.batch == 'core'
        continue-on-error: true
        run: npx tsx scripts/warm-gacha-packs.ts

      # ── Daily — holders, beezie traits, fresh gacha (full Dune run) ──
      - name: Holders
        if: steps.which.outputs.batch == 'daily'
        continue-on-error: true
        run: npx tsx scripts/warm-holders.ts
      - name: Beezie traits
        if: steps.which.outputs.batch == 'daily'
        continue-on-error: true
        run: npx tsx scripts/warm-traits.ts
      - name: Gacha (fresh)
        if: steps.which.outputs.batch == 'daily'
        continue-on-error: true
        run: npx tsx scripts/warm-gacha-dune.ts
      - name: Phygitals marketplace
        if: steps.which.outputs.batch == 'daily'
        continue-on-error: true
        run: npx tsx scripts/warm-phygitals.ts
      - name: Core volume (fresh Dune execution)
        if: steps.which.outputs.batch == 'daily'
        continue-on-error: true
        run: npx tsx scripts/warm-core-dune.ts
      # Time-series spine — must run LAST in the daily batch: it reads the fresh
      # core-volume (Dune), marketcap, and holders output the steps above wrote.
      - name: Metric snapshots (time-series spine)
        if: steps.which.outputs.batch == 'daily'
        continue-on-error: true
        run: npx tsx scripts/warm-metric-snapshots.ts

      # ── Weekly — full CC collection trait crawl (~122K assets) ──
      - name: CC trait crawl
        if: steps.which.outputs.batch == 'cc-traits'
        continue-on-error: true
        run: npx tsx scripts/warm-cc-traits.ts
